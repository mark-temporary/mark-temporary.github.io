  - title: "OceanThrill Murder Mystery"
    description: >
      A multiplatform interactive fiction in the tradition of Infocom, Magnetic Scrolls and Level9.
      A missing submersible, a group of rich adventurers who vanished on the way to the wreck of the RMS Lusitania and, 
      on top of it all, the Interim CEO of OceanThrill (owner and operator of the missing Kepler 1 sub) 
      murdered at his own private beachfront.
      
      This is the plot of Happy Ferret Entertainment's first in an upcoming series of mystery adventure games, presented in glorious 8 and 16 bit.
    img: "/img/OceanThrill.png"
    release_date: "2026-12-24"
    tags: 
      - Amiga
      - AtariST
      - C64 / C128
      - ZX Spectrum Next
      - Amstrad CPC
      - Windows
      - macOS
      - GNU/Linux
      - MS DOS

  - title: "Tomáš: Prince of Rejection"
    description: >
      A spiritual successor to Al Lowe's beloved Leisure Suit Larry series.
      Tomáš is your typical loser. Always on the hunt for the love of his life, yet his toxic personality dooms him
      to a life in which the only attention a woman will ever grant him is a Karate kick to his crown jewels.

      Follow Tomáš on his first adventure through the ancient Middle East, as he ventures to proclaim himself the Messiah,
      romance Mary Magdalene and garner the ire of Roman and Jew alike.  
    img: "/img/Tomasz.png"
    release_date: "TBA"
    tags:
      - Windows
      - macOS
      - GNU/Linux
      - Xbox Series
      - Android
      - iOS
